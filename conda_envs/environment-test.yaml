name: ptgp-test
channels:
    - conda-forge
dependencies:
    - python>=3.12
    - jax
    - jaxlib
    - optax
    - numpy
    - pytest
    - gpjax
    # transitive deps of pytensor + pymc, pulled in here because we pip-install
    # those two from git with --no-deps (pre-release versions don't satisfy each
    # other's resolver constraints).
    - scipy
    - filelock
    - numba
    - setuptools
    - cons
    - etuples
    - logical-unification
    - minikanren
    - arviz
    - cachetools
    - cloudpickle
    - pandas
    - rich
    - threadpoolctl
    - typing_extensions
    - pip
