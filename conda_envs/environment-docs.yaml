name: ptgp-docs
channels:
    - conda-forge
dependencies:
    - python>=3.12
    # Runtime deps: autodoc imports ptgp, so the full runtime stack has to
    # be in scope.
    - jax
    - jaxlib
    - optax
    - numpy
    - scipy
    - libblas=*=*mkl
    - mkl-service
    - pymc>=6.1.0,<6.2
    - pytensor>=3.1.2,<3.2
    - matplotlib
    # Docs build deps.
    - ipython
    - jupyter
    - sphinx>=7
    - pydata-sphinx-theme
    - myst-nb
    - numpydoc
    - sphinx-copybutton
    - sphinx-design
    - sphinx-codeautolink
    - sphinx-sitemap
    - sphinx-notfound-page
    - sphinx-autobuild
    - jupyter-sphinx
    - sphinxcontrib-bibtex
    - pip
    - pip:
        # ptgp itself so autodoc resolves the current source tree.
        - -e ..
