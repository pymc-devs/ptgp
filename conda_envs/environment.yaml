name: ptgp
channels:
    - conda-forge
dependencies:
    - python>=3.12
    - pymc
    - pytensor>=3.0.3
    - jax
    - jaxlib
    - optax
    - scipy
    - pytest
    - gpjax
    - ipykernel
    - ipywidgets
    - ipympl
    - matplotlib
    - seaborn
    - pandas
    - scikit-learn
    - pre-commit
    - pytest
    - mypy
    - polars
    - nutpie
    # Docs tooling — kept in sync with conda_envs/environment-docs.yaml so
    # `make html` works in the dev env without an extra install step.
    - sphinx>=7
    - pydata-sphinx-theme
    - myst-nb
    - numpydoc
    - sphinx-copybutton
    - sphinx-design
    - sphinx-codeautolink
    - sphinx-sitemap
    - sphinx-notfound-page
    - jupyter-sphinx
    - sphinxcontrib-bibtex
    - arviz
    - pip
