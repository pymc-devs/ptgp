name: ptgp
channels:
    - conda-forge
dependencies:
    - python>=3.12
    #- pymc  # installed from v6 branch via pip
    - jax
    - jaxlib
    - optax
    - scipy
    - libblas=*=*mkl
    - mkl-service
    - pytest
    - gpjax
    - ipykernel
    - ipywidgets
    - ipympl
    - matplotlib
    - seaborn
    - pandas
    - scikit-learn
    - pre-commit
    - pytest
    #- arviz  # installed via pip (arviz 1.x + arviz-base + arviz-plots)
    - pymc
    - pip
    - pip:
        - git+https://github.com/pymc-devs/pytensor@main
        - git+https://github.com/arviz-devs/preliz@main
