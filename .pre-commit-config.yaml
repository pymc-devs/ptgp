ci:
  autofix_prs: false

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    -   id: check-merge-conflict
    -   id: check-toml
    -   id: check-yaml
    -   id: debug-statements
    -   id: end-of-file-fixer
    -   id: no-commit-to-branch
        args: [--branch, main]
    -   id: trailing-whitespace

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.5.5
  hooks:
    - id: ruff
      args: [ --fix, --unsafe-fixes, --exit-non-zero-on-fix ]
    - id: ruff-format
      types_or: [ python, pyi ]  # notebooks are hand-formatted; keep ruff-format off them

- repo: https://github.com/MarcoGorelli/madforhooks
  rev: 0.4.1
  hooks:
    - id: no-print-statements
      files: ^ptgp/
      exclude: ^ptgp/_cli\.py$

- repo: local
  hooks:
    - id: check-kernel-gallery
      name: check covariance gallery covers every public kernel
      entry: python scripts/check_kernel_gallery.py
      language: system
      pass_filenames: false
      files: ^(ptgp/kernels/|docs/sphinxext/generate_kernel_gallery\.py$)
